name: PNG Library Generator

on:
  workflow_dispatch:
    inputs:
      start_index:
        description: Start index
        required: false
        default: "0"
      end_index:
        description: End index
        required: false
        default: "800"
      action:
        description: What to do
        required: false
        default: generate
        type: choice
        options:
          - generate
          - status_check
  schedule:
    - cron: "30 20 * * *"

jobs:

  trigger-kaggle:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.action == 'generate'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Setup Kaggle Credentials
        run: |
          mkdir -p ~/.kaggle
          printf '%s' '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          echo "Kaggle CLI version:"
          kaggle --version
          echo "Verifying credentials..."
          kaggle kernels list --mine --page-size 1 || echo "WARNING: Credential check failed"

      - name: Calculate Batch
        id: batch
        run: |
          START="${{ github.event.inputs.start_index }}"
          END="${{ github.event.inputs.end_index }}"
          if [ -z "$START" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -f "progress/batch_tracker.txt" ]; then
              LAST=$(cat progress/batch_tracker.txt)
              START=$LAST
              END=$((LAST + 800))
            else
              START=0
              END=800
            fi
          fi
          if [ "$END" -gt "46502" ]; then END=46502; fi
          if [ "$START" -ge "46502" ]; then echo "All done!"; exit 0; fi
          echo "start_index=$START" >> $GITHUB_OUTPUT
          echo "end_index=$END" >> $GITHUB_OUTPUT
          echo "Batch $START to $END"

      - name: Inject Credentials
        run: |
          python3 inject_creds.py \
            "${{ steps.batch.outputs.start_index }}" \
            "${{ steps.batch.outputs.end_index }}" \
            "${{ github.repository }}" \
            "${{ secrets.GOOGLE_CLIENT_ID }}" \
            "${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            "${{ secrets.GOOGLE_REFRESH_TOKEN }}"

      - name: Fix Kernel Metadata ID
        run: |
          # Ensure kernel-metadata.json uses the correct username from secrets
          cd kaggle
          sed -i "s|\"id\": \"[^\"]*\"|\"id\": \"${{ secrets.KAGGLE_USERNAME }}/notebook8c5ae1ecf2\"|" kernel-metadata.json
          echo "Updated kernel-metadata.json:"
          cat kernel-metadata.json

      - name: Push to Kaggle
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/notebook8c5ae1ecf2"
          SLUG="notebook8c5ae1ecf2"

          echo "========================================"
          echo "  STRATEGY: Poll → Pull-Sync → Push"
          echo "========================================"

          # ── STEP 1: Wait until kernel is truly idle ──
          echo "[Step 1] Waiting for kernel to become idle..."
          MAX_WAIT=300
          WAITED=0
          while [ $WAITED -lt $MAX_WAIT ]; do
            CURRENT=$(kaggle kernels status $KERNEL 2>&1)
            S=$(echo "$CURRENT" | grep -oiE 'running|queued' | head -1 | tr '[:upper:]' '[:lower:]')

            if [ "$S" = "running" ] || [ "$S" = "queued" ]; then
              echo "  [$WAITED s] Kernel is $S — cancelling..."
              kaggle kernels cancel $KERNEL 2>/dev/null || true
              sleep 30
              WAITED=$((WAITED + 30))
            else
              echo "  Kernel is idle (status: $CURRENT)"
              break
            fi
          done

          # ── STEP 2: Pull latest version to sync metadata ──
          echo ""
          echo "[Step 2] Pulling latest kernel version to sync..."
          mkdir -p /tmp/kaggle-sync
          kaggle kernels pull $KERNEL -p /tmp/kaggle-sync -m 2>/dev/null || echo "  Pull failed (kernel may not exist yet — that's OK)"

          # If pull succeeded, extract the version number and sync
          if [ -f "/tmp/kaggle-sync/kernel-metadata.json" ]; then
            echo "  Synced metadata from Kaggle"
            cat /tmp/kaggle-sync/kernel-metadata.json
          fi

          # ── STEP 3: Push with exponential backoff ──
          echo ""
          echo "[Step 3] Pushing kernel with retry..."
          cd kaggle
          MAX_RETRIES=5
          RETRY=0
          DELAY=30

          while [ $RETRY -lt $MAX_RETRIES ]; do
            echo "  Attempt $((RETRY + 1))/$MAX_RETRIES (delay was ${DELAY}s)..."

            OUTPUT=$(kaggle kernels push -p . 2>&1) && {
              echo "  ✅ PUSHED SUCCESSFULLY!"
              echo "  $OUTPUT"
              break
            } || {
              echo "  ❌ Failed: $OUTPUT"
              RETRY=$((RETRY + 1))

              # If 409 conflict, try deleting and recreating on last attempts
              if echo "$OUTPUT" | grep -q "409"; then
                if [ $RETRY -ge 3 ]; then
                  echo ""
                  echo "  [Fallback] 409 persists — deleting kernel and recreating..."
                  python3 -c "
import json, os
try:
    os.system(f'kaggle kernels delete $KERNEL')
    print('  Kernel deleted, waiting 30s...')
except:
    print('  Delete failed, continuing...')
"
                  sleep 30
                fi
              fi

              if [ $RETRY -lt $MAX_RETRIES ]; then
                echo "  Waiting ${DELAY}s before retry..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              else
                echo ""
                echo "  ❌ ALL $MAX_RETRIES ATTEMPTS FAILED"
                echo "  Manual fix: Go to kaggle.com → Your Kernels → Delete '$SLUG' → Re-run this workflow"
                exit 1
              fi
            }
          done

          echo "Waiting 60s for Kaggle to register..."
          sleep 60

      - name: Wait for Kaggle
        run: |
          MAX=14400
          W=0
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/notebook8c5ae1ecf2"
          echo "Monitoring kernel: $KERNEL"
          echo "Max wait: ${MAX}s (~4 hours)"
          echo "========================================"

          while [ $W -lt $MAX ]; do
            FULL=$(kaggle kernels status $KERNEL 2>&1)
            S=$(echo "$FULL" | grep -oE 'complete|running|error|queued' | head -1)
            echo "[${W}s] Status: ${S:-unknown} | $FULL"

            if [ "$S" = "complete" ]; then
              echo "========================================"
              echo "Kernel COMPLETE!"
              break
            fi

            if [ "$S" = "error" ]; then
              echo "========================================"
              echo "Kernel FAILED! Check Kaggle logs."
              exit 1
            fi

            if [ -z "$S" ] && [ $W -ge 300 ]; then
              echo "WARNING: No status after ${W}s - kernel may not have started"
              echo "Full output: $FULL"
            fi

            sleep 120
            W=$((W + 120))
          done

          if [ $W -ge $MAX ]; then
            echo "TIMEOUT: Kernel did not finish in ${MAX}s"
            exit 1
          fi

      - name: Save Progress
        if: success()
        run: echo "${{ steps.batch.outputs.end_index }}" > progress/batch_tracker.txt

      - name: Commit Progress
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Batch ${{ steps.batch.outputs.start_index }}-${{ steps.batch.outputs.end_index }} done"
          file_pattern: progress/batch_tracker.txt

  status-check:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'status_check'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Progress Report
        run: |
          echo "========================================"
          echo "   PNG Library Progress Report"
          echo "========================================"
          if [ -f "progress/batch_tracker.txt" ]; then
            DONE=$(cat progress/batch_tracker.txt)
            REMAINING=$((46502 - DONE))
            echo "  Done      : $DONE / 46502"
            echo "  Remaining : $REMAINING"
            echo "  Days left : ~$((REMAINING / 800))"
          else
            echo "  Not started yet!"
          fi
          echo "========================================"
