name: Section 1 - Kaggle Image + Drive + ultradata.xlsx

on:
  push:
    branches: [main]
    paths:
      - "kaggle/**"
      - "prompts/**"
      - "inject_creds.py"
  workflow_dispatch:
    inputs:
      instant_count:
        description: "Instant run: number of items to process now. Leave empty for scheduled batching."
        required: false
        default: ""
      start_index:
        description: Start index
        required: false
        default: "0"
      end_index:
        description: End index (ignored if instant_count provided)
        required: false
        default: "300"
      action:
        description: What to do
        required: false
        default: generate
        type: choice
        options:
          - generate
          - status_check
          - cancel_schedule
  schedule:
    - cron: "30 20 * * *"

env:
  NOTEBOOK_SLUG: notebook8c5ae1ecf2

permissions:
  contents: write
  actions: write

jobs:

  # ── NEW: Cancel any queued/in-progress scheduled runs ─────────────────────
  cancel-schedule:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'cancel_schedule'
    steps:
      - name: Cancel queued & in-progress scheduled runs
        run: |
          echo "Looking for queued/in-progress runs to cancel..."
          for STATUS in queued in_progress; do
            gh run list \
              --workflow=trigger_kaggle.yml \
              --status=$STATUS \
              --json databaseId,event \
              --jq '.[] | select(.event == "schedule") | .databaseId' \
            | xargs -r -I{} sh -c 'echo "Cancelling run {}..." && gh run cancel {}'
          done
          echo "Done. All matching scheduled runs cancelled."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  trigger-kaggle:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'push' ||
      github.event.inputs.action == 'generate'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true   # BUG FIX: required for git-auto-commit to push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Kaggle CLI + nbconvert
        run: pip install kaggle nbconvert nbformat

      - name: Setup Kaggle Credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          kaggle --version
          echo "Kaggle username: ${{ secrets.KAGGLE_USERNAME }}"
          kaggle kernels list --mine --page-size 1 || { echo "ERROR: Kaggle credentials invalid!"; exit 1; }

      - name: Calculate Batch
        id: batch
        run: |
          START="${{ github.event.inputs.start_index }}"
          END="${{ github.event.inputs.end_index }}"
          COUNT="${{ github.event.inputs.instant_count }}"

          # ── STEP 1: Resolve START ──────────────────────────────
          if [ -z "$START" ] || [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            if [ -f "progress/batch_tracker.txt" ]; then
              START=$(cat progress/batch_tracker.txt)
              echo "Resuming from batch_tracker: $START"
            else
              START=0
              echo "No tracker found — starting from 0"
            fi
          fi

          # ── STEP 2: Resolve END ────────────────────────────────
          if [ -n "$COUNT" ] && [ "$COUNT" -gt "0" ]; then
            END=$((START + COUNT))
            echo "instant_count=$COUNT → END=$END"
          elif [ -z "$END" ] || [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            END=$((START + 300))
            echo "Default batch 300 → END=$END"
          fi

          # ── STEP 3: Safety clamp ──────────────────────────────
          if [ "$END" -gt "43082" ]; then END=43082; fi
          if [ "$START" -ge "43082" ]; then
            echo "✅ All 43082 items done!"
            exit 0
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Batch: $START → $END  ($(( END - START )) items)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "start_index=$START" >> $GITHUB_OUTPUT
          echo "end_index=$END" >> $GITHUB_OUTPUT

      - name: Clean Notebook Outputs (remove old data)
        run: |
          echo "Clearing old notebook outputs..."
          python3 -c "
          import json
          with open('kaggle/main_pipeline.ipynb', 'r', encoding='utf-8') as f:
              nb = json.load(f)
          for cell in nb.get('cells', []):
              cell['outputs'] = []
              cell['execution_count'] = None
              if 'metadata' in cell:
                  cell['metadata'] = {'trusted': True}
          with open('kaggle/main_pipeline.ipynb', 'w', encoding='utf-8') as f:
              json.dump(nb, f, ensure_ascii=False, indent=1)
          print(f'Cleaned {len(nb[\"cells\"])} cells — all outputs removed!')
          "

      - name: Inject Credentials
        env:
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GITHUB_TOKEN_REPO2_VAL: ${{ secrets.REPO_2_TOKEN }}
          GITHUB_REPO2_VAL:       ${{ secrets.REPO_2 }}
          GITHUB_TOKEN_REPO1_VAL: ${{ secrets.REPO_1_TOKEN }}
        run: |
          python3 inject_creds.py \
            "${{ steps.batch.outputs.start_index }}" \
            "${{ steps.batch.outputs.end_index }}" \
            "${{ github.repository }}"
          echo "Credentials injected for batch ${{ steps.batch.outputs.start_index }} → ${{ steps.batch.outputs.end_index }}"

      - name: Sync Kernel Metadata
        run: |
          cd kaggle
          KERNEL_ID="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          python3 -c "
          import json
          with open('kernel-metadata.json', 'r') as f:
              meta = json.load(f)
          meta['id'] = '${KERNEL_ID}'
          with open('kernel-metadata.json', 'w') as f:
              json.dump(meta, f, indent=2)
          print('kernel-metadata.json updated:')
          print(json.dumps(meta, indent=2))
          "

      - name: Verify Before Push
        run: |
          echo "=== kernel-metadata.json ==="
          cat kaggle/kernel-metadata.json
          echo ""
          python3 -c "
          import json
          with open('kaggle/main_pipeline.ipynb') as f:
              nb = json.load(f)
          cells = nb['cells']
          total_outputs = sum(len(c.get('outputs',[])) for c in cells)
          print(f'Notebook cells: {len(cells)}')
          print(f'Old outputs: {total_outputs}')
          if total_outputs == 0:
              print('Notebook is clean!')
          else:
              print('WARNING: old outputs present!')
          "

      - name: Push to Kaggle
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          echo "Pushing kernel: $KERNEL"

          for i in 1 2 3 4 5; do
            STATUS=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            echo "[$i] $STATUS"
            if echo "$STATUS" | grep -qiE 'running|queued'; then
              echo "Kernel busy — cancelling..."
              kaggle kernels cancel "$KERNEL" 2>/dev/null || true
              sleep 30
            else
              break
            fi
          done

          cd kaggle
          MAX_RETRIES=3
          ATTEMPT=0
          DELAY=30

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Push attempt $ATTEMPT/$MAX_RETRIES..."
            OUTPUT=$(kaggle kernels push -p . 2>&1)
            EXIT_CODE=$?
            echo "Output: $OUTPUT"
            if [ $EXIT_CODE -eq 0 ] && ! echo "$OUTPUT" | grep -qiE 'conflict|cannot change'; then
              echo "PUSH SUCCESSFUL!"
              break
            else
              echo "Push failed"
              if [ $ATTEMPT -lt $MAX_RETRIES ]; then
                echo "Retrying in ${DELAY}s..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              else
                echo "ALL ATTEMPTS FAILED"
                exit 1
              fi
            fi
          done

          echo "Waiting 90s for kernel to start..."
          sleep 90

      - name: Wait for Kaggle Completion
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          MAX=14400
          ELAPSED=0
          POLL=120
          SEEN_RUNNING=false

          echo "Monitoring: $KERNEL"
          echo "Timeout: ${MAX}s (~4 hours)"

          while [ $ELAPSED -lt $MAX ]; do
            FULL=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            S=$(echo "$FULL" | grep -oiE 'complete|running|error|queued' | head -1 | tr '[:upper:]' '[:lower:]')
            MINS=$((ELAPSED / 60))
            echo "[${MINS}m] Status: ${S:-unknown}"

            case "$S" in
              running) SEEN_RUNNING=true ;;
              queued)  echo "  Waiting for GPU..." ;;
              complete)
                if [ "$SEEN_RUNNING" = true ] || [ $ELAPSED -ge 300 ]; then
                  echo "KERNEL COMPLETED!"
                  exit 0
                else
                  echo "  Stale status — waiting for new run..."
                fi ;;
              error)
                if [ "$SEEN_RUNNING" = true ]; then
                  echo "KERNEL FAILED"
                  exit 1
                else
                  echo "  Stale error — waiting for new run..."
                fi ;;
            esac

            sleep $POLL
            ELAPSED=$((ELAPSED + POLL))
          done

          echo "TIMEOUT"
          exit 1

      - name: Download Kaggle Output (get effective end index)
        if: success()
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          echo "Downloading Kaggle output..."
          mkdir -p /tmp/kaggle_out
          kaggle kernels output "$KERNEL" -p /tmp/kaggle_out 2>/dev/null || true
          if [ -f "/tmp/kaggle_out/effective_end.txt" ]; then
            EFF=$(cat /tmp/kaggle_out/effective_end.txt | tr -d '[:space:]')
            echo "Effective end from pipeline: $EFF"
            echo "EFFECTIVE_END=$EFF" >> $GITHUB_ENV
          else
            echo "EFFECTIVE_END=${{ steps.batch.outputs.end_index }}" >> $GITHUB_ENV
          fi

      - name: Save & Push Progress
        if: success()
        run: |
          echo "$EFFECTIVE_END" > progress/batch_tracker.txt
          echo "Saving batch_tracker.txt = $EFFECTIVE_END"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress/batch_tracker.txt

          if git diff --staged --quiet; then
            echo "batch_tracker.txt unchanged — nothing to commit"
            exit 0
          fi

          git commit -m "Batch ${{ steps.batch.outputs.start_index }}-${{ steps.batch.outputs.end_index }} done"

          PUSHED=false
          for ATTEMPT in 1 2 3 4; do
            echo "Push attempt $ATTEMPT/4..."
            if git push; then
              PUSHED=true
              echo "✅ batch_tracker.txt pushed (attempt $ATTEMPT)"
              break
            fi
            echo "  Push failed — pulling rebase and retrying..."
            git fetch origin main
            git rebase origin/main --autostash || git merge origin/main --no-edit
            sleep $((ATTEMPT * 5))
          done

          if [ "$PUSHED" = false ]; then
            echo "❌ CRITICAL: batch_tracker.txt push failed after 4 attempts!"
            exit 1
          fi

  status-check:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'status_check'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Progress Report
        run: |
          if [ -f "progress/batch_tracker.txt" ]; then
            DONE=$(cat progress/batch_tracker.txt)
            echo "Done: $DONE / 43082 ($((DONE * 100 / 43082))%)"
            echo "Remaining: $((43082 - DONE))"
            echo "Est. days: ~$(((43082 - DONE) / 300))  (at 300 images/day)"
          else
            echo "Not started yet!"
          fi
