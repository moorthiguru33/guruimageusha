name: "Trigger 1 — Generate Images"

# ─────────────────────────────────────────────────────────────
# HOW IT WORKS:
#   NORMAL MODE  → Pushes to Kaggle → waits for completion →
#                  auto-triggers next day (days countdown)
#   INSTANT MODE → Pushes to Kaggle → immediately triggers
#                  next batch without waiting (count batches)
#
# TO START (Normal):  Actions → "Trigger 1" → set days (e.g. 7)
# TO START (Instant): Actions → "Trigger 1" → instant_trigger=true → set count
# TO STOP:            Cancel running workflow  OR  set days=0
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Normal mode: How many days to run? (0 = stop)"
        required: false
        default: "7"
      start_index:
        description: "Start index (leave blank = auto from tracker)"
        required: false
        default: ""
      instant_trigger:
        description: "Instant mode? (fire next batch immediately, no wait)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      count:
        description: "Instant mode: How many batches to fire? (e.g. 3)"
        required: false
        default: "1"

env:
  NOTEBOOK_SLUG: pipeline_generate_nb

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Check stop condition (Normal mode only) ────────────
      - name: Check days
        id: days_check
        run: |
          INSTANT="${{ github.event.inputs.instant_trigger }}"
          DAYS="${{ github.event.inputs.days }}"
          COUNT="${{ github.event.inputs.count }}"

          if [ "$INSTANT" = "true" ]; then
            echo "=== INSTANT MODE: $COUNT batches ==="
            echo "should_run=true"  >> $GITHUB_OUTPUT
            echo "instant=true"     >> $GITHUB_OUTPUT
            echo "count=$COUNT"     >> $GITHUB_OUTPUT
            echo "days=0"           >> $GITHUB_OUTPUT
          else
            echo "=== NORMAL MODE: $DAYS days ==="
            echo "instant=false" >> $GITHUB_OUTPUT
            if [ "$DAYS" -le "0" ]; then
              echo "Days = 0 — stopping pipeline."
              echo "should_run=false" >> $GITHUB_OUTPUT
            else
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "days=$DAYS"      >> $GITHUB_OUTPUT
            fi
          fi

      # ── 3. Setup ─────────────────────────────────────────────
      - name: Setup Python
        if: steps.days_check.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tools
        if: steps.days_check.outputs.should_run == 'true'
        run: pip install kaggle

      - name: Setup Kaggle credentials
        if: steps.days_check.outputs.should_run == 'true'
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          kaggle kernels list --mine --page-size 1 || { echo "ERROR: Kaggle credentials invalid!"; exit 1; }

      # ── 4. Calculate batch ────────────────────────────────────
      - name: Calculate batch
        if: steps.days_check.outputs.should_run == 'true'
        id: batch
        run: |
          TOTAL=43082
          OVERRIDE="${{ github.event.inputs.start_index }}"

          if [ -n "$OVERRIDE" ]; then
            START=$OVERRIDE
          elif [ -f "progress/batch_tracker.txt" ]; then
            START=$(cat progress/batch_tracker.txt | tr -d '[:space:]')
          else
            START=0
          fi

          END=$((START + 200))
          if [ "$END" -gt "$TOTAL" ]; then END=$TOTAL; fi

          if [ "$START" -ge "$TOTAL" ]; then
            echo "All $TOTAL prompts done! Resetting to 0."
            START=0
            END=200
          fi

          echo "start_index=$START" >> $GITHUB_OUTPUT
          echo "end_index=$END"     >> $GITHUB_OUTPUT
          echo "Batch: $START → $END ($(( END - START )) images)"

      # ── 5. Auto-generate prompt splits if missing ─────────────
      - name: Generate prompt splits
        if: steps.days_check.outputs.should_run == 'true'
        run: |
          COUNT=$(ls prompts/splits/*.json 2>/dev/null | grep -v index | wc -l)
          if [ "$COUNT" -lt "23" ]; then
            echo "Generating prompt splits ($COUNT/23 found)..."
            pip install -q numpy
            python prompts/prompt_engine.py
          else
            echo "Splits OK ($COUNT files)"
          fi

      - name: Commit prompt splits
        if: steps.days_check.outputs.should_run == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated prompt splits [skip ci]"
          file_pattern: "prompts/splits/*.json"

      # ── 6. Build fresh notebook from .py ─────────────────────
      - name: Build fresh notebook
        if: steps.days_check.outputs.should_run == 'true'
        run: |
          python3 -c "
          import json
          with open('kaggle/pipeline_generate.py', 'r', encoding='utf-8') as f:
              code = f.read()
          nb = {
              'nbformat': 4, 'nbformat_minor': 5,
              'metadata': {
                  'kernelspec': {'display_name': 'Python 3', 'language': 'python', 'name': 'python3'},
                  'language_info': {'name': 'python', 'version': '3.10.0'}
              },
              'cells': [{'cell_type': 'code', 'execution_count': None,
                         'metadata': {'trusted': True}, 'outputs': [],
                         'source': code}]
          }
          with open('kaggle/pipeline_generate.ipynb', 'w', encoding='utf-8') as f:
              json.dump(nb, f, ensure_ascii=False, indent=1)
          print(f'Notebook built fresh: {len(code)} chars | 0 old outputs')
          "

      # ── 7. Inject credentials ─────────────────────────────────
      - name: Inject credentials
        if: steps.days_check.outputs.should_run == 'true'
        env:
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GITHUB_TOKEN_REPO2_VAL: ${{ secrets.REPO_2_TOKEN }}
          GITHUB_REPO2_VAL:       ${{ secrets.REPO_2 }}
          GITHUB_TOKEN_REPO1_VAL: ${{ secrets.REPO_1_TOKEN }}
        run: |
          python3 inject_creds.py \
            "${{ steps.batch.outputs.start_index }}" \
            "${{ steps.batch.outputs.end_index }}"   \
            "${{ github.repository }}"               \
            "kaggle/pipeline_generate.ipynb"

      # ── 8. Sync kernel metadata → kernel-metadata.json ───────
      # FIX: Write directly to kernel-metadata.json (what kaggle CLI reads)
      - name: Sync kernel metadata
        if: steps.days_check.outputs.should_run == 'true'
        run: |
          python3 -c "
          import json
          kid = '${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}'
          with open('kaggle/kernel_generate_metadata.json') as f:
              meta = json.load(f)
          meta['id'] = kid
          # Write to kernel-metadata.json — this is what 'kaggle kernels push -p .' reads
          with open('kaggle/kernel-metadata.json', 'w') as f:
              json.dump(meta, f, indent=2)
          print('Kernel ID set to:', kid)
          print('Written to: kaggle/kernel-metadata.json')
          "

      # ── 9. Push to Kaggle ─────────────────────────────────────
      - name: Push to Kaggle
        if: steps.days_check.outputs.should_run == 'true'
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"

          # Cancel if already running
          for i in 1 2 3; do
            STATUS=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            if echo "$STATUS" | grep -qiE 'running|queued'; then
              echo "Kernel busy — cancelling..."
              kaggle kernels cancel "$KERNEL" 2>/dev/null || true
              sleep 30
            else
              break
            fi
          done

          # Push with retry
          cd kaggle
          for attempt in 1 2 3; do
            echo "Push attempt $attempt/3..."
            OUTPUT=$(kaggle kernels push -p . 2>&1)
            EXIT=$?
            echo "$OUTPUT"
            if [ $EXIT -eq 0 ] && ! echo "$OUTPUT" | grep -qiE 'conflict|cannot'; then
              echo "Push successful!"; break
            fi
            [ $attempt -lt 3 ] && sleep $((30 * attempt)) || { echo "All pushes failed"; exit 1; }
          done

          echo "Waiting 90s for kernel to start..."
          sleep 90

      # ── 10. INSTANT MODE — trigger next immediately ───────────
      # Fires next batch WITHOUT waiting for Kaggle to finish
      - name: "INSTANT: Trigger next batch immediately"
        if: steps.days_check.outputs.should_run == 'true' && steps.days_check.outputs.instant == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_START="${{ steps.batch.outputs.end_index }}"
          REMAINING=$(( ${{ github.event.inputs.count }} - 1 ))

          # Save progress immediately (don't wait for Kaggle)
          echo "$NEXT_START" > progress/batch_tracker.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress/batch_tracker.txt
          git commit -m "Instant batch ${{ steps.batch.outputs.start_index }}-${{ steps.batch.outputs.end_index }} fired ⚡ | remaining: $REMAINING" || true
          git push || true

          if [ "$REMAINING" -gt "0" ]; then
            echo "Firing next instant batch (remaining: $REMAINING)..."
            gh workflow run trigger_generate.yml \
              --ref "${{ github.ref_name }}" \
              --field instant_trigger="true" \
              --field count="$REMAINING" \
              --field start_index="$NEXT_START"
            echo "Next instant batch triggered ⚡"
          else
            echo "All ${{ github.event.inputs.count }} instant batches fired! 🎉"
          fi

      # ── 11. NORMAL MODE — wait for Kaggle completion ──────────
      - name: "NORMAL: Wait for Kaggle completion"
        if: steps.days_check.outputs.should_run == 'true' && steps.days_check.outputs.instant != 'true'
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          MAX=18000
          ELAPSED=0
          SEEN_RUNNING=false

          while [ $ELAPSED -lt $MAX ]; do
            FULL=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            S=$(echo "$FULL" | grep -oiE 'complete|running|error|queued' | head -1 | tr '[:upper:]' '[:lower:]')
            echo "[$(( ELAPSED/60 ))min] Status: ${S:-unknown}"

            case "$S" in
              running)  SEEN_RUNNING=true ;;
              queued)   echo "  Waiting for GPU..." ;;
              complete)
                # FIX: Only accept complete if we actually saw it running first
                if [ "$SEEN_RUNNING" = true ]; then
                  echo "Kaggle run COMPLETE! ✅"; exit 0
                else
                  echo "  Stale complete status — waiting for actual run..."
                fi ;;
              error)
                if [ "$SEEN_RUNNING" = true ]; then echo "Kaggle run FAILED ❌"; exit 1; fi ;;
            esac

            sleep 120
            ELAPSED=$((ELAPSED + 120))
          done
          echo "TIMEOUT after 5h"; exit 1

      # ── 12. NORMAL MODE — Save progress ───────────────────────
      - name: "NORMAL: Save progress"
        if: steps.days_check.outputs.should_run == 'true' && steps.days_check.outputs.instant != 'true' && success()
        run: |
          echo "${{ steps.batch.outputs.end_index }}" > progress/batch_tracker.txt
          REMAINING=$(( ${{ steps.days_check.outputs.days }} - 1 ))
          echo "$REMAINING" > progress/remaining_days.txt
          echo "Remaining days: $REMAINING"

      - name: "NORMAL: Commit progress"
        if: steps.days_check.outputs.should_run == 'true' && steps.days_check.outputs.instant != 'true' && success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Batch ${{ steps.batch.outputs.start_index }}-${{ steps.batch.outputs.end_index }} done ✅ | remaining days: $(( ${{ steps.days_check.outputs.days }} - 1 ))"
          file_pattern: "progress/*.txt"

      # ── 13. NORMAL MODE — Auto-trigger next day ───────────────
      - name: "NORMAL: Trigger next day"
        if: steps.days_check.outputs.should_run == 'true' && steps.days_check.outputs.instant != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMAINING=$(( ${{ steps.days_check.outputs.days }} - 1 ))
          if [ "$REMAINING" -gt "0" ]; then
            echo "Scheduling next run (remaining: $REMAINING days)..."
            gh workflow run trigger_generate.yml \
              --ref "${{ github.ref_name }}" \
              --field days="$REMAINING"
            echo "Next run triggered ✅"
          else
            echo "All days completed! Pipeline finished. 🎉"
          fi
