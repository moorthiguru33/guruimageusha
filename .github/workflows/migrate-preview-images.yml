name: Migrate Preview Images to GitHub CDN

on:
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max designs to process (0 = all)'
        required: false
        default: '0'
      resume:
        description: 'Resume — skip already uploaded images?'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      dry_run:
        description: 'Dry run (test only, no changes)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout guruimageusha
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TOKEN }}
          path: guruimageusha

      - name: Clone Gurumoorthi repo (script branch)
        run: |
          git clone -b claude/replace-preview-image-urls-sTR3m \
            https://x-access-token:${{ secrets.TOKEN }}@github.com/moorthiguru33/Gurumoorthi.git gurumoorthi
          echo "Cloned OK"

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: gurumoorthi
        run: npm install sharp xlsx

      - name: Run migrate-to-github-images.js
        working-directory: gurumoorthi
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        run: |
          FLAGS=""
          [ "${{ inputs.dry_run }}" = "true" ] && FLAGS="$FLAGS --dry-run"
          [ "${{ inputs.resume }}"  = "true" ] && FLAGS="$FLAGS --resume"
          [ "${{ inputs.limit }}"  != "0"    ] && FLAGS="$FLAGS --limit=${{ inputs.limit }}"
          node migrate-to-github-images.js $FLAGS

      # Push designs.xlsx (with new CDN URLs) → Gurumoorthi repo
      - name: Push designs.xlsx to Gurumoorthi
        if: ${{ inputs.dry_run != 'true' }}
        working-directory: gurumoorthi
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add designs.xlsx url-mapping.json
          git diff --cached --quiet && echo "No xlsx changes" || \
            git commit -m "Replace preview image URLs with GitHub CDN in designs.xlsx"
          git push https://x-access-token:${{ secrets.TOKEN }}@github.com/moorthiguru33/Gurumoorthi.git HEAD:claude/replace-preview-image-urls-sTR3m

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: url-mapping
          path: |
            gurumoorthi/url-mapping.json
            gurumoorthi/migration-errors.json

      - name: Print summary
        if: always()
        working-directory: gurumoorthi
        run: |
          echo "===== MIGRATION SUMMARY ====="
          [ -f url-mapping.json ] && \
            echo "Mapped: $(node -e "console.log(Object.keys(require('./url-mapping.json')).length)")" || true
          [ -f migration-errors.json ] && \
            echo "Errors: $(node -e "console.log(require('./migration-errors.json').length)")" || true
          echo "CDN: https://cdn.jsdelivr.net/gh/moorthiguru33/guruimageusha@main/preview_images/"
