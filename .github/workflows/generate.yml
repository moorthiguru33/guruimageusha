# ══════════════════════════════════════════════════════════════════════════════
# PIXAZO AI - GitHub Actions Workflow v6.0
# ══════════════════════════════════════════════════════════════════════════════
# Smart ZIP Upload: generate → ZIP → upload 1 file → auto-extract → cleanup
# ══════════════════════════════════════════════════════════════════════════════

name: Pixazo AI - Generate Images

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model"
        required: false
        default: "flux-schnell"
        type: choice
        options:
          - flux-schnell
          - sdxl
          - sdxl-base
          - stable-diffusion-inpainting
      count:
        description: "Images per JSON (number or ALL)"
        required: false
        default: "ALL"
        type: string
      width:
        description: "Image width"
        required: false
        default: "1024"
        type: string
      height:
        description: "Image height"
        required: false
        default: "1024"
        type: string

  push:
    paths:
      - "prompts/**"

  # schedule:
  #   - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  generate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate Images & Smart Upload to Google Drive
        env:
          PIXAZO_API_KEY:          ${{ secrets.PIXAZO_API_KEY }}
          GOOGLE_CLIENT_ID:        ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:    ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:    ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID:  ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GOOGLE_APPS_SCRIPT_URL:  ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          PIXAZO_MODEL:            ${{ github.event.inputs.model || 'flux-schnell' }}
          PIXAZO_COUNT:            ${{ github.event.inputs.count || 'ALL' }}
          PIXAZO_WIDTH:            ${{ github.event.inputs.width || '1024' }}
          PIXAZO_HEIGHT:           ${{ github.event.inputs.height || '1024' }}
          PIXAZO_PROMPTS_DIR:      "prompts"
        run: python pixazo_github.py

      - name: Commit updated JSON statuses
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add prompts/*.json
          git diff --cached --quiet || git commit -m "Auto-update: image generation status [skip ci]"
          git push || echo "Nothing to push"
