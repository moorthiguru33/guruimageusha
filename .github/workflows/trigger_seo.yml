name: "Trigger 2 — SEO Content"

# ─────────────────────────────────────────────────────────────
# HOW IT WORKS:
#   NORMAL MODE  → Pushes to Kaggle → waits for completion
#   INSTANT MODE → Pushes to Kaggle → immediately triggers
#                  next run without waiting (count runs)
#   DRY RUN      → Count pending items only, no SEO generation
#
# OPTIONS:
#   category       → Run SEO for one specific category only
#   limit          → Max items to process in this run
#   force_reprocess→ Re-generate SEO even for published items
#
# TO RUN (Normal):  Actions → "Trigger 2" → Run workflow
# TO RUN (Instant): Set instant_trigger=true + count
# DRY RUN:          Set dry_run=true
# ─────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run? (count pending only, no generation)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      instant_trigger:
        description: "Instant mode? (fire next run immediately, no wait)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      count:
        description: "Instant mode: How many runs to fire?"
        required: false
        default: "1"
      category:
        description: "Category filter (leave blank = all pending)"
        required: false
        default: ""
      limit:
        description: "Max items to process (leave blank = all)"
        required: false
        default: ""
      force_reprocess:
        description: "Force reprocess already published items?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  NOTEBOOK_SLUG: pipeline_seo_nb

permissions:
  contents: write
  actions: write   # FIX: Required for gh workflow run (instant trigger)

jobs:
  seo:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup ─────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tools
        run: pip install kaggle requests

      - name: Setup Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          kaggle kernels list --mine --page-size 1 || { echo "ERROR: Kaggle credentials invalid!"; exit 1; }

      # ── 3. Dry run — count pending ────────────────────────────
      - name: Dry run count
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GITHUB_TOKEN_REPO2:   ${{ secrets.REPO_2_TOKEN }}
          GITHUB_REPO2:         ${{ secrets.REPO_2 }}
          FILTER_CATEGORY:      ${{ github.event.inputs.category }}
          FORCE_REPROCESS:      ${{ github.event.inputs.force_reprocess }}
        run: |
          python3 -c "
          import os, csv, io, json
          import requests as req

          # Get Drive token
          r = req.post('https://oauth2.googleapis.com/token', data={
              'client_id':     os.environ['GOOGLE_CLIENT_ID'],
              'client_secret': os.environ['GOOGLE_CLIENT_SECRET'],
              'refresh_token': os.environ['GOOGLE_REFRESH_TOKEN'],
              'grant_type':    'refresh_token',
          }, timeout=30)
          token = r.json().get('access_token','')
          if not token: print('Drive auth failed'); exit(1)

          # Find manifest.csv
          h = {'Authorization': f'Bearer {token}'}
          r2 = req.get('https://www.googleapis.com/drive/v3/files',
                       headers=h, params={'q': \"name='ultrapng_manifest.csv' and trashed=false\",
                                          'fields': 'files(id)'}, timeout=30)
          files = r2.json().get('files', [])
          if not files: print('manifest.csv not found on Drive — run Trigger 1 first!'); exit(0)

          fid = files[0]['id']
          r3  = req.get(f'https://www.googleapis.com/drive/v3/files/{fid}',
                        headers=h, params={'alt': 'media'}, timeout=60)
          rows = list(csv.DictReader(io.StringIO(r3.text)))
          print(f'manifest.csv total rows: {len(rows)}')

          # Category filter
          cat_filter = os.environ.get('FILTER_CATEGORY', '').strip()
          if cat_filter:
              rows = [r for r in rows if r.get('category','').lower() == cat_filter.lower()]
              print(f'After category filter ({cat_filter}): {len(rows)} rows')

          # Check Repo2 for published
          force = os.environ.get('FORCE_REPROCESS','false').lower() == 'true'
          if not force:
              repo2  = os.environ.get('GITHUB_REPO2','')
              t2     = os.environ.get('GITHUB_TOKEN_REPO2','')
              api_url = f'https://api.github.com/repos/{repo2}/contents/data'
              r4 = req.get(api_url, headers={'Authorization': f'Bearer {t2}'}, timeout=30)
              published = set()
              if r4.ok:
                  for f in r4.json():
                      if f['name'].endswith('.json') and not f['name'].startswith('_'):
                          rc = req.get(f['download_url'], timeout=30)
                          if rc.ok:
                              for item in rc.json():
                                  published.add(item.get('filename',''))
              pending = [r for r in rows if r.get('filename') not in published]
              print(f'Already published: {len(published)}')
              print(f'Pending SEO:       {len(pending)}')

              # Category breakdown of pending
              cats = {}
              for r in pending:
                  c = r.get('category','unknown')
                  cats[c] = cats.get(c,0) + 1
              print('--- Pending by category ---')
              for c, n in sorted(cats.items(), key=lambda x: -x[1]):
                  print(f'  {c}: {n}')
          else:
              print(f'Force reprocess ON — all {len(rows)} items will be reprocessed')
          "
          exit 0

      # ── 4. Build fresh SEO notebook ───────────────────────────
      - name: Build fresh notebook
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python3 -c "
          import json
          with open('kaggle/pipeline_seo.py', 'r', encoding='utf-8') as f:
              code = f.read()
          nb = {
              'nbformat': 4, 'nbformat_minor': 5,
              'metadata': {
                  'kernelspec': {'display_name': 'Python 3', 'language': 'python', 'name': 'python3'},
                  'language_info': {'name': 'python', 'version': '3.10.0'}
              },
              'cells': [{'cell_type': 'code', 'execution_count': None,
                         'metadata': {'trusted': True}, 'outputs': [],
                         'source': code}]
          }
          with open('kaggle/pipeline_seo.ipynb', 'w', encoding='utf-8') as f:
              json.dump(nb, f, ensure_ascii=False, indent=1)
          print(f'SEO notebook built fresh: {len(code)} chars')
          "

      # ── 5. Inject credentials + options ──────────────────────
      - name: Inject credentials
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GITHUB_TOKEN_REPO2_VAL: ${{ secrets.REPO_2_TOKEN }}
          GITHUB_REPO2_VAL:       ${{ secrets.REPO_2 }}
          GITHUB_TOKEN_REPO1_VAL: ${{ secrets.REPO_1_TOKEN }}
          SEO_CATEGORY_FILTER:    ${{ github.event.inputs.category }}
          SEO_LIMIT:              ${{ github.event.inputs.limit }}
          SEO_FORCE_REPROCESS:    ${{ github.event.inputs.force_reprocess }}
        run: |
          python3 inject_creds.py \
            "0" "0" \
            "${{ github.repository }}" \
            "kaggle/pipeline_seo.ipynb"

          # Inject SEO-specific options as extra env vars in the creds cell
          python3 -c "
          import json, os

          nb_path = 'kaggle/pipeline_seo.ipynb'
          with open(nb_path, 'r', encoding='utf-8') as f:
              nb = json.load(f)

          extra = '''
          os.environ[\"SEO_CATEGORY_FILTER\"] = \"${SEO_CATEGORY_FILTER}\"
          os.environ[\"SEO_LIMIT\"]            = \"${SEO_LIMIT}\"
          os.environ[\"SEO_FORCE_REPROCESS\"]  = \"${SEO_FORCE_REPROCESS}\"
          print(f\"  SEO options: category={os.environ.get('SEO_CATEGORY_FILTER') or 'ALL'}, limit={os.environ.get('SEO_LIMIT') or 'ALL'}, force={os.environ.get('SEO_FORCE_REPROCESS')}\")
          '''

          # Append to the first (creds) cell
          src = nb['cells'][0]['source']
          if isinstance(src, list):
              src = ''.join(src)
          nb['cells'][0]['source'] = src + extra

          with open(nb_path, 'w', encoding='utf-8') as f:
              json.dump(nb, f, ensure_ascii=False, indent=1)
          print('SEO options injected OK')
          "

      # ── 6. Sync kernel metadata → kernel-metadata.json ───────
      # FIX: Write directly to kernel-metadata.json (what kaggle CLI reads)
      - name: Sync kernel metadata
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          python3 -c "
          import json
          kid = '${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}'
          with open('kaggle/kernel_seo_metadata.json') as f:
              meta = json.load(f)
          meta['id'] = kid
          # Write to kernel-metadata.json — this is what 'kaggle kernels push -p .' reads
          with open('kaggle/kernel-metadata.json', 'w') as f:
              json.dump(meta, f, indent=2)
          print('SEO Kernel ID set to:', kid)
          print('Written to: kaggle/kernel-metadata.json')
          "

      # ── 7. Push to Kaggle ─────────────────────────────────────
      - name: Push to Kaggle
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"

          for i in 1 2 3; do
            STATUS=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            if echo "$STATUS" | grep -qiE 'running|queued'; then
              echo "Kernel busy — cancelling..."
              kaggle kernels cancel "$KERNEL" 2>/dev/null || true
              sleep 30
            else
              break
            fi
          done

          cd kaggle
          for attempt in 1 2 3; do
            echo "Push attempt $attempt/3..."
            OUTPUT=$(kaggle kernels push -p . 2>&1)
            EXIT=$?
            echo "$OUTPUT"
            if [ $EXIT -eq 0 ] && ! echo "$OUTPUT" | grep -qiE 'conflict|cannot'; then
              echo "Push successful!"; break
            fi
            [ $attempt -lt 3 ] && sleep $((30 * attempt)) || { echo "All pushes failed"; exit 1; }
          done

          echo "Waiting 90s for kernel to start..."
          sleep 90

      # ── 8. INSTANT MODE — trigger next immediately ───────────
      - name: "INSTANT: Trigger next run immediately"
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.instant_trigger == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMAINING=$(( ${{ github.event.inputs.count }} - 1 ))

          # Save instant run timestamp
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') — Instant SEO run fired ⚡" >> progress/seo_run_log.txt
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress/seo_run_log.txt
          git commit -m "Instant SEO run fired ⚡ | remaining: $REMAINING" || true
          git push || true

          if [ "$REMAINING" -gt "0" ]; then
            echo "Firing next instant SEO run (remaining: $REMAINING)..."
            gh workflow run trigger_seo.yml \
              --ref "${{ github.ref_name }}" \
              --field instant_trigger="true" \
              --field count="$REMAINING" \
              --field category="${{ github.event.inputs.category }}" \
              --field limit="${{ github.event.inputs.limit }}" \
              --field force_reprocess="${{ github.event.inputs.force_reprocess }}"
            echo "Next instant SEO run triggered ⚡"
          else
            echo "All ${{ github.event.inputs.count }} instant SEO runs fired! 🎉"
          fi

      # ── 9. NORMAL MODE — wait for completion ──────────────────
      - name: "NORMAL: Wait for SEO completion"
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.instant_trigger != 'true'
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          MAX=21600
          ELAPSED=0
          SEEN_RUNNING=false

          while [ $ELAPSED -lt $MAX ]; do
            FULL=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            S=$(echo "$FULL" | grep -oiE 'complete|running|error|queued' | head -1 | tr '[:upper:]' '[:lower:]')
            echo "[$(( ELAPSED/60 ))min] Status: ${S:-unknown}"

            case "$S" in
              running)  SEEN_RUNNING=true ;;
              queued)   echo "  Waiting for GPU..." ;;
              complete)
                # FIX: Only accept complete if we actually saw it running first
                if [ "$SEEN_RUNNING" = true ]; then
                  echo "SEO run COMPLETE! ✅"; exit 0
                else
                  echo "  Stale complete status — waiting for actual run..."
                fi ;;
              error)
                if [ "$SEEN_RUNNING" = true ]; then echo "SEO run FAILED ❌"; exit 1; fi ;;
            esac

            sleep 120
            ELAPSED=$((ELAPSED + 120))
          done
          echo "TIMEOUT"; exit 1

      # ── 10. NORMAL MODE — Save progress log ───────────────────
      - name: "NORMAL: Save run log"
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.instant_trigger != 'true' && success()
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') — SEO run complete ✅ | category: ${{ github.event.inputs.category || 'ALL' }} | limit: ${{ github.event.inputs.limit || 'ALL' }}" >> progress/seo_run_log.txt

      - name: "NORMAL: Commit run log"
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.instant_trigger != 'true' && success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "SEO run complete ✅ | $(date -u '+%Y-%m-%d')"
          file_pattern: "progress/seo_run_log.txt"
