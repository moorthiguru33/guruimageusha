name: Run Pending Drive Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# V3.3  — BFS recursive folder discovery (all nested subfolders)
# Triggers: push to main when pipeline files change, or manual dispatch.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - "pending_pipeline.py"
      - "inject_creds_pending.py"
      - ".github/workflows/pending_pipeline.yml"

  workflow_dispatch:
    inputs:
      run_items_count:
        description: "How many images to process (e.g. 10, 50, 100, 200)"
        required: false
        default: "50"
      # rembg_model removed — pipeline now uses BRIA RMBG-2.0 SOTA (fixed)

jobs:
  push-to-kaggle:
    name: Inject credentials & push notebook
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Kaggle CLI ──────────────────────────────────────────────────────
      - name: Install Kaggle CLI
        run: pip install kaggle --quiet

      # ── 4. Inject creds & push to Kaggle ──────────────────────────────────
      - name: Inject credentials & push to Kaggle
        env:
          # ── Required secrets (GitHub → Settings → Secrets) ─────────────
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          KAGGLE_USERNAME:       ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:            ${{ secrets.KAGGLE_KEY }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN }}
          GH_OWNER:              ${{ secrets.GH_OWNER }}

          # ── Optional variables (GitHub → Settings → Variables) ─────────
          # WATERMARK_TEXT        – text stamped on preview images
          WATERMARK_TEXT:        ${{ vars.WATERMARK_TEXT        || 'www.ultrapng.com' }}

          # PENDING_FOLDER_NAME   – root folder name inside Google Drive
          PENDING_FOLDER_NAME:   ${{ vars.PENDING_FOLDER_NAME   || 'pending' }}

          # KAGGLE_NOTEBOOK_SLUG  – slug of your Kaggle kernel
          KAGGLE_NOTEBOOK_SLUG:  ${{ vars.KAGGLE_NOTEBOOK_SLUG  || 'pending-drive-pipeline' }}

          # PREVIEW_REPO          – GitHub repo that receives WebP previews
          PREVIEW_REPO:          ${{ vars.PREVIEW_REPO          || 'guruimageusha' }}
          PREVIEW_BRANCH:        ${{ vars.PREVIEW_BRANCH        || 'main' }}
          PREVIEW_FOLDER:        ${{ vars.PREVIEW_FOLDER        || 'preview_webp' }}

          # ULTRADATA_REPO        – private repo that holds ultradata.xlsx
          ULTRADATA_REPO:        ${{ vars.ULTRADATA_REPO        || 'ultrapng' }}
          ULTRADATA_FILE:        ${{ vars.ULTRADATA_FILE        || 'ultradata.xlsx' }}
          ULTRADATA_BRANCH:      ${{ vars.ULTRADATA_BRANCH      || 'main' }}

          # RUN_ITEMS_COUNT – how many images to pick from pending this run
          # Priority: manual dispatch → repo variable → default 50
          RUN_ITEMS_COUNT: >-
            ${{ github.event.inputs.run_items_count
                || vars.RUN_ITEMS_COUNT
                || '50' }}

          # REMBG_MODEL removed — BRIA RMBG-2.0 SOTA is now hardcoded in pipeline

        run: python inject_creds_pending.py

      # ── 5. Summary ─────────────────────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        run: |
          echo "### Pending Pipeline V3.4 — Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Discovery mode | BFS recursive (all nested subfolders) |" >> $GITHUB_STEP_SUMMARY
          echo "| Run items | ${{ github.event.inputs.run_items_count || vars.RUN_ITEMS_COUNT || '50' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| BG model | BRIA RMBG-2.0 SOTA (briaai/RMBG-2.0, 1024px, direct HF) |" >> $GITHUB_STEP_SUMMARY
          echo "| Pending folder | ${{ vars.PENDING_FOLDER_NAME || 'pending' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview folder | ${{ vars.PREVIEW_FOLDER || 'preview_webp' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CDN base | cdn.jsdelivr.net/gh/OWNER/${{ vars.PREVIEW_REPO || 'guruimageusha' }}@main/${{ vars.PREVIEW_FOLDER || 'preview_webp' }}/ |" >> $GITHUB_STEP_SUMMARY
          echo "| ultradata repo | ${{ vars.ULTRADATA_REPO || 'ultrapng' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kaggle notebook | ${{ vars.KAGGLE_NOTEBOOK_SLUG || 'pending-drive-pipeline' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
