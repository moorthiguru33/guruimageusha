name: Run Pending Drive Pipeline

# ────────────────────────────────────────────────────────────────
# Triggers:
#   1. Push to main when pipeline files change
#   2. Manual dispatch with optional overrides
# ────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - "pending_pipeline.py"
      - "inject_creds_pending.py"
      - ".github/workflows/pending_pipeline.yml"

  workflow_dispatch:
    inputs:
      run_items_count:
        description: "Images to process per run (e.g. 50)"
        required: false
        default: "50"
      upscale_factor:
        description: "Upscale factor: 2 or 4  (2 = faster, 4 = sharper)"
        required: false
        default: "2"
      rembg_model:
        description: "rembg model name (isnet-general-use / u2net / u2net_human_seg)"
        required: false
        default: "isnet-general-use"

jobs:
  push-to-kaggle:
    name: Inject credentials & push notebook
    runs-on: ubuntu-latest
    timeout-minutes: 10      # Just the push step, not Kaggle runtime

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Kaggle CLI ────────────────────────────────────────
      - name: Install Kaggle CLI
        run: pip install kaggle --quiet

      # ── 4. Push notebook ─────────────────────────────────────
      - name: Inject credentials & push to Kaggle
        env:
          # ── Required secrets (GitHub → Settings → Secrets) ──
          GOOGLE_CLIENT_ID:      ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:  ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:  ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          KAGGLE_USERNAME:       ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:            ${{ secrets.KAGGLE_KEY }}

          # ── Tunable variables (GitHub → Settings → Variables) ─
          WATERMARK_TEXT:        ${{ vars.WATERMARK_TEXT || 'www.ultrapng.com' }}
          PENDING_FOLDER_NAME:   ${{ vars.PENDING_FOLDER_NAME || 'pending' }}
          MAX_INPUT_SIZE:        ${{ vars.MAX_INPUT_SIZE || '1200' }}
          KAGGLE_NOTEBOOK_SLUG:  ${{ vars.KAGGLE_NOTEBOOK_SLUG || 'pending-drive-pipeline' }}

          # ── Can be overridden by workflow_dispatch inputs ─────
          RUN_ITEMS_COUNT: >-
            ${{ github.event.inputs.run_items_count
                || vars.RUN_ITEMS_COUNT
                || '50' }}
          UPSCALE_FACTOR: >-
            ${{ github.event.inputs.upscale_factor
                || vars.UPSCALE_FACTOR
                || '2' }}
          REMBG_MODEL: >-
            ${{ github.event.inputs.rembg_model
                || vars.REMBG_MODEL
                || 'isnet-general-use' }}

        run: python inject_creds_pending.py

      # ── 5. Summary ───────────────────────────────────────────
      - name: Pipeline summary
        if: always()
        run: |
          echo "### Pending Pipeline Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Run items | ${{ github.event.inputs.run_items_count || vars.RUN_ITEMS_COUNT || '50' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Upscale | ${{ github.event.inputs.upscale_factor || vars.UPSCALE_FACTOR || '2' }}× |" >> $GITHUB_STEP_SUMMARY
          echo "| rembg model | ${{ github.event.inputs.rembg_model || vars.REMBG_MODEL || 'isnet-general-use' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kaggle notebook | ${{ vars.KAGGLE_NOTEBOOK_SLUG || 'pending-drive-pipeline' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
