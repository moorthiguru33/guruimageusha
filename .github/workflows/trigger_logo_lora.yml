name: Logo LoRA — Kaggle FLUX.1-dev + Logo LoRA Pipeline

on:
  workflow_dispatch:
    inputs:
      instant_count:
        description: "Instant run: number of items to process now. Leave empty for scheduled batching."
        required: false
        default: ""
      start_index:
        description: Start index (leave empty to resume from lora_batch_tracker.txt)
        required: false
        default: ""
      end_index:
        description: End index (ignored if instant_count provided)
        required: false
        default: "200"
      category:
        description: "Optional: run only one category (leave empty = ALL logo categories)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - admissions_enrollment
          - openings_launches
          - events
          - education
          - announcements
          - business_promotions
          - calls_to_action
      action:
        description: What to do
        required: false
        default: generate
        type: choice
        options:
          - generate
          - status_check
  schedule:
    - cron: "0 22 * * *"   # 10 PM UTC daily — offset from main pipeline (20:30)

# ── Use a SEPARATE Kaggle kernel slug for the LoRA pipeline ──────────────────
env:
  NOTEBOOK_SLUG: logo-lora-pipeline   # ← Change to your actual Kaggle kernel slug

permissions:
  contents: write

jobs:

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Run the Logo LoRA pipeline on Kaggle
  # ════════════════════════════════════════════════════════════════════════════
  trigger-logo-lora:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.action == 'generate'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Kaggle CLI + nbformat
        run: pip install kaggle nbformat nbconvert

      - name: Setup Kaggle Credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          kaggle --version
          echo "Kaggle username: ${{ secrets.KAGGLE_USERNAME }}"
          kaggle kernels list --mine --page-size 1 || { echo "ERROR: Kaggle credentials invalid!"; exit 1; }

      # ── Calculate the batch range ─────────────────────────────────────────
      - name: Calculate Batch
        id: batch
        run: |
          START="${{ github.event.inputs.start_index }}"
          END="${{ github.event.inputs.end_index }}"
          COUNT="${{ github.event.inputs.instant_count }}"

          # ── Resolve START ────────────────────────────────────────────────
          # Use lora_batch_tracker.txt (separate from main pipeline tracker)
          if [ -z "$START" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -f "progress/lora_batch_tracker.txt" ]; then
              START=$(cat progress/lora_batch_tracker.txt)
              echo "Resuming from lora_batch_tracker: $START"
            else
              START=0
              echo "No lora tracker found — starting from 0"
            fi
          fi

          # ── Resolve END ──────────────────────────────────────────────────
          if [ -n "$COUNT" ] && [ "$COUNT" -gt "0" ]; then
            END=$((START + COUNT))
            echo "instant_count=$COUNT → END=$END"
          elif [ -z "$END" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            END=$((START + 200))
            echo "Default batch 200 → END=$END"
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Logo LoRA Batch: $START → $END  ($(( END - START )) items)"
          echo "  Category: ${{ github.event.inputs.category || 'ALL' }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "start_index=$START" >> $GITHUB_OUTPUT
          echo "end_index=$END"     >> $GITHUB_OUTPUT

      # ── Wrap logo_lora_pipeline.py into a clean notebook ─────────────────
      - name: Build logo_lora_pipeline.ipynb from .py
        run: |
          python3 - << 'PYEOF'
          import json, pathlib

          py_src = pathlib.Path("kaggle/logo_lora_pipeline.py").read_text(encoding="utf-8")

          nb = {
              "nbformat": 4,
              "nbformat_minor": 5,
              "metadata": {
                  "kernelspec": {"display_name": "Python 3", "language": "python", "name": "python3"},
                  "language_info": {"name": "python", "version": "3.10.0"}
              },
              "cells": [
                  {
                      "cell_type": "code",
                      "execution_count": None,
                      "metadata": {"trusted": True},
                      "outputs": [],
                      "source": py_src
                  }
              ]
          }

          out = pathlib.Path("kaggle/logo_lora_pipeline.ipynb")
          out.write_text(json.dumps(nb, ensure_ascii=False, indent=1), encoding="utf-8")
          print(f"Built {out}  ({out.stat().st_size:,} bytes, 1 code cell)")
          PYEOF

      # ── Inject credentials as the FIRST notebook cell ────────────────────
      - name: Inject Credentials
        env:
          GOOGLE_CLIENT_ID:       ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:   ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:   ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GITHUB_TOKEN_REPO2_VAL: ${{ secrets.REPO_2_TOKEN }}
          GITHUB_REPO2_VAL:       ${{ secrets.REPO_2 }}
          GITHUB_TOKEN_REPO1_VAL: ${{ secrets.REPO_1_TOKEN }}
        run: |
          python3 - \
            "${{ steps.batch.outputs.start_index }}" \
            "${{ steps.batch.outputs.end_index }}"   \
            "${{ github.repository }}"               \
            "${{ github.event.inputs.category }}"    \
          << 'PYEOF'
          import sys, os, json

          start    = sys.argv[1]
          end      = sys.argv[2]
          repo1    = sys.argv[3]
          category = sys.argv[4] if len(sys.argv) > 4 else ""

          client_id       = os.environ.get("GOOGLE_CLIENT_ID", "")
          client_secret   = os.environ.get("GOOGLE_CLIENT_SECRET", "")
          refresh_token   = os.environ.get("GOOGLE_REFRESH_TOKEN", "")
          github_token_r2 = os.environ.get("GITHUB_TOKEN_REPO2_VAL", "")
          github_repo2    = os.environ.get("GITHUB_REPO2_VAL", "")
          github_token_r1 = os.environ.get("GITHUB_TOKEN_REPO1_VAL", "")

          CREDS_MARKER = "# __ULTRAPNG_LORA_CREDENTIALS_CELL__"

          inject_code = f"""{CREDS_MARKER}
          import os
          os.environ["START_INDEX"]          = "{start}"
          os.environ["END_INDEX"]            = "{end}"
          os.environ["GITHUB_REPO"]          = "{repo1}"
          os.environ["GOOGLE_CLIENT_ID"]     = "{client_id}"
          os.environ["GOOGLE_CLIENT_SECRET"] = "{client_secret}"
          os.environ["GOOGLE_REFRESH_TOKEN"] = "{refresh_token}"
          os.environ["GITHUB_TOKEN_REPO2"]   = "{github_token_r2}"
          os.environ["GITHUB_REPO2"]         = "{github_repo2}"
          os.environ["GITHUB_TOKEN_REPO1"]   = "{github_token_r1}"
          os.environ["LOGO_LORA_CATEGORY"]   = "{category}"
          print("Logo LoRA credentials loaded. Batch: {start} -> {end}")
          print(f"  Category : {'{category}' or 'ALL'}")
          print(f"  REPO2    : {github_repo2 or '(not set)'}")
          print(f"  Google   : {'OK' if client_id else '(not set)'}")
          """

          nb_path = "kaggle/logo_lora_pipeline.ipynb"
          with open(nb_path, "r", encoding="utf-8") as f:
              nb = json.load(f)

          def cell_source(c):
              src = c.get("source", "")
              return "".join(src) if isinstance(src, list) else src

          cells = [c for c in nb.get("cells", []) if CREDS_MARKER not in cell_source(c)]

          creds_cell = {
              "cell_type": "code",
              "execution_count": None,
              "metadata": {"trusted": True},
              "outputs": [],
              "source": inject_code
          }
          cells.insert(0, creds_cell)
          nb["cells"] = cells

          with open(nb_path, "w", encoding="utf-8") as f:
              json.dump(nb, f, ensure_ascii=False, indent=1)

          print(f"Injected credentials → {nb_path}  (total cells: {len(cells)})")
          PYEOF

      # ── Write/update the LoRA-specific kernel-metadata.json ──────────────
      - name: Sync LoRA Kernel Metadata
        run: |
          KERNEL_ID="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          python3 - << PYEOF
          import json

          meta = {
              "id": "${KERNEL_ID}",
              "title": "${{ env.NOTEBOOK_SLUG }}",
              "code_file": "logo_lora_pipeline.ipynb",
              "language": "python",
              "kernel_type": "notebook",
              "is_private": True,
              "enable_gpu": True,
              "enable_internet": True,
              "dataset_sources": [
                  "gurumoorthirajagopal/my-pipeline-models"
              ],
              "competition_sources": [],
              "kernel_sources": []
          }

          # Must be named kernel-metadata.json — kaggle CLI ignores other names
          with open("kaggle/logo_lora_kernel_metadata.json", "w") as f:
              json.dump(meta, f, indent=2)

          print("logo_lora_kernel_metadata.json written:")
          print(json.dumps(meta, indent=2))
          PYEOF

      # Kaggle CLI requires the metadata file to be named kernel-metadata.json
      # We keep a separate copy for the LoRA kernel and swap it in at push time


          PYEOF

      # ── Safety check before push ──────────────────────────────────────────
      - name: Verify Before Push
        run: |
          # Rename to kernel-metadata.json — kaggle CLI only reads this exact name
          cp kaggle/logo_lora_kernel_metadata.json kaggle/kernel-metadata.json
          echo "=== kaggle/kernel-metadata.json (LoRA kernel) ==="
          cat kaggle/kernel-metadata.json
          echo ""
          python3 -c "
          import json
          with open('kaggle/logo_lora_pipeline.ipynb') as f:
              nb = json.load(f)
          cells = nb['cells']
          total_outputs = sum(len(c.get('outputs',[])) for c in cells)
          print(f'Notebook cells : {len(cells)}')
          print(f'Stale outputs  : {total_outputs}')
          if total_outputs == 0:
              print('Notebook is clean!')
          else:
              print('WARNING: old outputs present!')
          "

      # ── Push to Kaggle (separate kernel from main pipeline) ───────────────
      - name: Push to Kaggle
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          echo "Pushing kernel: $KERNEL"

          # Check if kernel already exists — gracefully skip 403/404 (first push creates it)
          KERNEL_EXISTS=false
          for i in 1 2 3 4 5; do
            STATUS=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            echo "[$i] $STATUS"
            if echo "$STATUS" | grep -qiE '403|404|not found|does not exist'; then
              echo "Kernel not found yet — will be created on first push"
              break
            elif echo "$STATUS" | grep -qiE 'running|queued'; then
              KERNEL_EXISTS=true
              echo "Kernel busy — cancelling..."
              kaggle kernels cancel "$KERNEL" 2>/dev/null || true
              sleep 30
            else
              KERNEL_EXISTS=true
              break
            fi
          done

          # Push — kernel-metadata.json must be in the push directory (kaggle CLI default)
          # logo_lora_pipeline.ipynb + kernel-metadata.json are both in kaggle/
          cd kaggle
          MAX_RETRIES=3
          ATTEMPT=0
          DELAY=30

          while [ $ATTEMPT -lt $MAX_RETRIES ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Push attempt $ATTEMPT/$MAX_RETRIES..."

            OUTPUT=$(kaggle kernels push -p . 2>&1)
            EXIT_CODE=$?
            echo "Output: $OUTPUT"

            if [ $EXIT_CODE -eq 0 ] && ! echo "$OUTPUT" | grep -qiE 'conflict|cannot change'; then
              echo "PUSH SUCCESSFUL!"
              break
            else
              echo "Push failed"
              if [ $ATTEMPT -lt $MAX_RETRIES ]; then
                echo "Retrying in ${DELAY}s..."
                sleep $DELAY
                DELAY=$((DELAY * 2))
              else
                echo "ALL ATTEMPTS FAILED"
                exit 1
              fi
            fi
          done

          echo "Waiting 90s for kernel to start..."
          sleep 90

      # ── Poll until done (same 4-hour timeout as main pipeline) ───────────
      - name: Wait for Kaggle Completion
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          MAX=14400
          ELAPSED=0
          POLL=120
          SEEN_RUNNING=false

          echo "Monitoring: $KERNEL"
          echo "Timeout: ${MAX}s (~4 hours)"

          while [ $ELAPSED -lt $MAX ]; do
            FULL=$(kaggle kernels status "$KERNEL" 2>&1 || true)
            S=$(echo "$FULL" | grep -oiE 'complete|running|error|queued' | head -1 | tr '[:upper:]' '[:lower:]')
            MINS=$((ELAPSED / 60))
            echo "[${MINS}m] Status: ${S:-unknown}"

            case "$S" in
              running)
                SEEN_RUNNING=true
                ;;
              queued)
                echo "  Waiting for GPU..."
                ;;
              complete)
                if [ "$SEEN_RUNNING" = true ] || [ $ELAPSED -ge 300 ]; then
                  echo "KERNEL COMPLETED!"
                  exit 0
                else
                  echo "  Stale status — waiting for new run..."
                fi
                ;;
              error)
                if [ "$SEEN_RUNNING" = true ]; then
                  echo "KERNEL FAILED"
                  exit 1
                else
                  echo "  Stale error — waiting for new run..."
                fi
                ;;
            esac

            sleep $POLL
            ELAPSED=$((ELAPSED + POLL))
          done

          echo "TIMEOUT"
          exit 1

      # ── Download effective_end.txt written by logo_lora_pipeline.py ──────
      - name: Download Kaggle Output (get effective end index)
        if: success()
        run: |
          KERNEL="${{ secrets.KAGGLE_USERNAME }}/${{ env.NOTEBOOK_SLUG }}"
          echo "Downloading Kaggle output..."
          mkdir -p /tmp/kaggle_lora_out
          kaggle kernels output "$KERNEL" -p /tmp/kaggle_lora_out 2>/dev/null || true

          if [ -f "/tmp/kaggle_lora_out/effective_end.txt" ]; then
            EFF=$(cat /tmp/kaggle_lora_out/effective_end.txt | tr -d '[:space:]')
            echo "Effective end from pipeline: $EFF"
            echo "EFFECTIVE_END=$EFF" >> $GITHUB_ENV
          else
            echo "EFFECTIVE_END=${{ steps.batch.outputs.end_index }}" >> $GITHUB_ENV
          fi

      # ── Save progress to lora_batch_tracker.txt (separate from main) ─────
      - name: Save & Push Progress
        if: success()
        run: |
          echo "$EFFECTIVE_END" > progress/lora_batch_tracker.txt
          echo "Saving lora_batch_tracker.txt = $EFFECTIVE_END"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress/lora_batch_tracker.txt

          if git diff --staged --quiet; then
            echo "lora_batch_tracker.txt unchanged — nothing to commit"
            exit 0
          fi

          git commit -m "Logo LoRA batch ${{ steps.batch.outputs.start_index }}-${{ steps.batch.outputs.end_index }} done"

          PUSHED=false
          for ATTEMPT in 1 2 3 4; do
            echo "Push attempt $ATTEMPT/4..."
            if git push; then
              PUSHED=true
              echo "lora_batch_tracker.txt pushed (attempt $ATTEMPT)"
              break
            fi
            echo "  Push failed — pulling rebase and retrying..."
            git fetch origin main
            git rebase origin/main --autostash || git merge origin/main --no-edit
            sleep $((ATTEMPT * 5))
          done

          if [ "$PUSHED" = false ]; then
            echo "CRITICAL: lora_batch_tracker.txt push failed after 4 attempts!"
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Status check (manual only)
  # ════════════════════════════════════════════════════════════════════════════
  status-check:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'status_check'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Logo LoRA Progress Report
        run: |
          echo "═══════════════════════════════════════"
          echo "  Logo LoRA Pipeline — Progress Report"
          echo "═══════════════════════════════════════"
          if [ -f "progress/lora_batch_tracker.txt" ]; then
            DONE=$(cat progress/lora_batch_tracker.txt)
            echo "Processed  : $DONE items"
            echo "Tracker    : progress/lora_batch_tracker.txt"
          else
            echo "Not started yet — lora_batch_tracker.txt not found"
          fi
          echo ""
          echo "Main pipeline tracker:"
          if [ -f "progress/batch_tracker.txt" ]; then
            MAIN=$(cat progress/batch_tracker.txt)
            echo "  Done: $MAIN / 43082 ($((MAIN * 100 / 43082))%)"
          else
            echo "  Not found"
          fi
