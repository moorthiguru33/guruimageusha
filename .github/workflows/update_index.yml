name: Update splits/index.json

on:
  # Auto-trigger: splits folder-ல் எந்த JSON மாறினாலும்
  push:
    paths:
      - "prompts/splits/**.json"
      - "!prompts/splits/index.json"   # index.json மாற்றம் trigger ஆகாது (loop தவிர்க்க)

  # Manual trigger: எப்போது வேண்டுமானாலும் Run பண்ணலாம்
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run update_index.py
        run: python update_index.py

      - name: Commit updated index.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "auto: rebuild splits/index.json"
          file_pattern: "prompts/splits/index.json"
