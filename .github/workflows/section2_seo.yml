name: Section 2 - SEO JSON Builder

# ─────────────────────────────────────────────────────────────────────────────
# V4.0 — Moondream2 Vision Model (free, MIT, CPU, no API key)
#   • Sees each PNG image visually → world-class SEO titles + keywords
#   • Titles like: "Bright Yellow Lemon PNG Transparent Background Free Download"
#     (NOT: "Lemon_03 PNG HD TRANSPARENT PNG DOWNLOAD")
#   • Runs 100 % free on ubuntu-latest CPU
#   • Model cached after first run → fast subsequent runs
#   • 5-hour job timeout → auto-restarts every run until all items done
#   • Checkpoints every 25 items → zero data loss on failure
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of pending items to process (empty = ALL)"
        required: false
        default: ""
      scan_drive:
        description: "Scan Drive png_library_images for unmatched PNGs (true/false)"
        required: false
        default: "true"

  # ── Auto-restart: uncomment to poll every 10 min until all items done ─────
  # schedule:
  #   - cron: "*/10 * * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # never cancel a running SEO job

permissions:
  contents: write
  actions:  write   # needed so the script can dispatch new workflow runs

jobs:
  build-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5-hour hard limit — script exits at 4h50m and auto-restarts

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            openpyxl \
            requests \
            pillow \
            "transformers>=4.40.0" \
            "timm>=0.9.0" \
            einops \
            accelerate
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      # ── 4. Restore Moondream2 model cache ──────────────────────────────────
      #    First run  → cache MISS → downloads ~1.9 GB once → cached
      #    Later runs → cache HIT  → loaded from disk instantly
      - name: Restore Moondream2 model cache
        id: hf-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-moondream2-2025-01-09-v1

      - name: Show cache status
        run: |
          if [ "${{ steps.hf-cache.outputs.cache-hit }}" = "true" ]; then
            echo "✅  Moondream2 cache HIT — no download needed"
          else
            echo "⬇️   Moondream2 cache MISS — downloading model (~1.9 GB)..."
          fi

      # ── 5. Run Section 2 ──────────────────────────────────────────────────
      - name: Run Section 2
        env:
          # ── Private UltraPNG repo (ultradata.xlsx + SEO JSONs) ────────────
          REPO2_TOKEN:          ${{ secrets.REPO_2_TOKEN }}
          REPO2_SLUG:           ${{ secrets.REPO_2 }}
          REPO2_MAX_PER_JSON:   "200"

          # ── Google Drive credentials (for png_library_images scan) ────────
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          # ── GitHub credentials (WEBP upload + auto-restart dispatch) ───────
          GH_TOKEN:             ${{ secrets.GH_TOKEN }}
          GH_OWNER:             ${{ secrets.GH_OWNER }}

          # ── Preview repo settings ──────────────────────────────────────────
          PREVIEW_REPO:         ${{ vars.PREVIEW_REPO    || 'guruimageusha' }}
          PREVIEW_BRANCH:       ${{ vars.PREVIEW_BRANCH  || 'main' }}
          PREVIEW_FOLDER:       ${{ vars.PREVIEW_FOLDER  || 'preview_webp' }}

          # ── Drive PNG library ──────────────────────────────────────────────
          PNG_LIBRARY_FOLDER:   ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }}
          WATERMARK_TEXT:       ${{ vars.WATERMARK_TEXT  || 'www.ultrapng.com' }}

          # ── Run controls ───────────────────────────────────────────────────
          S2_COUNT:             ${{ github.event.inputs.count }}
          SCAN_DRIVE:           ${{ github.event.inputs.scan_drive || 'true' }}

          # ── HuggingFace settings ───────────────────────────────────────────
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
          TOKENIZERS_PARALLELISM:       "false"

          # ── Auto-restart context (script uses these to dispatch itself) ────
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}

        run: python section2_runner.py

      # ── 6. Save Moondream2 model cache (always, even on failure) ──────────
      - name: Save Moondream2 model cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/huggingface
          key: hf-moondream2-2025-01-09-v1

      # ── 7. Summary ─────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "### Section 2 SEO Builder — Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Vision model | Moondream2 (vikhyatk/moondream2@2025-01-09) |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO strategy | Visual analysis → unique title + 30 keywords |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO count | ${{ github.event.inputs.count || 'ALL pending' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Drive | ${{ github.event.inputs.scan_drive || 'true' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drive folder | ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview repo | ${{ vars.PREVIEW_REPO || 'guruimageusha' }}/${{ vars.PREVIEW_FOLDER || 'preview_webp' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model cache | ${{ steps.hf-cache.outputs.cache-hit == 'true' && 'HIT ✅' || 'MISS — downloaded this run' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Job timeout | 5 hours (auto-restarts if still pending) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
