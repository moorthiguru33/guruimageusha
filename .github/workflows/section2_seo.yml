name: Section 2 - SEO JSON Builder

# ─────────────────────────────────────────────────────────────────────────────
# V6.0 — Florence-2-base Local Vision (CPU · No API · Unlimited · Free)
#
#   WHY Florence-2-base?
#   ─────────────────────────────────────────────────────────────────────────
#   ❌ Moondream2    : 8 min/image on CPU — too slow
#   ❌ Gemini API    : 429 rate-limit errors, deprecated 2.0-flash
#   ✅ Florence-2-base: 15-30s/image on CPU · no API key · no rate limit
#
#   Microsoft Florence-2-base (MIT License)
#   • 232M parameters — fits in GitHub Actions 7GB RAM easily
#   • <DETAILED_CAPTION> task: gives colors + style + visual details
#   • CPU-only: float32 inference, no GPU needed
#   • Model cached between runs (actions/cache) → only downloads once
#   • Unlimited: process any number of images, no daily cap
#   • Free forever: MIT license, runs entirely inside GitHub Actions
#
#   SPEED on GitHub Actions (2-core Ubuntu):
#   • Model load  : ~30s (first run) / ~5s (cached)
#   • Per image   : ~15-30s
#   • Per 5h run  : ~600-1200 images (auto-restart handles rest)
#
#   SETUP: No secrets needed! Just run the workflow.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of pending items to process (empty = ALL)"
        required: false
        default: ""
      scan_drive:
        description: "Scan Drive png_library_images for unmatched PNGs (true/false)"
        required: false
        default: "true"

  # ── Auto-restart: uncomment to poll every 10 min until all items done ─────
  # schedule:
  #   - cron: "*/10 * * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions:  write

jobs:
  build-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5-hour hard limit — script exits at 4h50m

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache HuggingFace model (avoids re-download between runs) ──────
      - name: Cache HuggingFace Florence-2 model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-florence2-base-${{ runner.os }}-v1
          restore-keys: |
            hf-florence2-base-${{ runner.os }}-

      # ── 4. Dependencies ───────────────────────────────────────────────────
      #    CPU-only torch (much smaller download than full torch)
      #    timm + einops required by Florence-2
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.52.0 timm einops
          pip install openpyxl requests pillow

      # ── 5. Run Section 2 ──────────────────────────────────────────────────
      - name: Run Section 2
        env:
          # ── Private UltraPNG repo ─────────────────────────────────────────
          REPO2_TOKEN:          ${{ secrets.REPO_2_TOKEN }}
          REPO2_SLUG:           ${{ secrets.REPO_2 }}
          REPO2_MAX_PER_JSON:   "200"

          # ── Google Drive credentials (for png_library_images scan) ────────
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          # ── GitHub credentials (WEBP upload + auto-restart dispatch) ───────
          GH_TOKEN:             ${{ secrets.GH_TOKEN }}
          GH_OWNER:             ${{ secrets.GH_OWNER }}

          # ── Preview repo settings ──────────────────────────────────────────
          PREVIEW_REPO:         ${{ vars.PREVIEW_REPO    || 'guruimageusha' }}
          PREVIEW_BRANCH:       ${{ vars.PREVIEW_BRANCH  || 'main' }}
          PREVIEW_FOLDER:       ${{ vars.PREVIEW_FOLDER  || 'preview_webp' }}

          # ── Drive PNG library ──────────────────────────────────────────────
          PNG_LIBRARY_FOLDER:   ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }}
          WATERMARK_TEXT:       ${{ vars.WATERMARK_TEXT  || 'www.ultrapng.com' }}

          # ── Run controls ───────────────────────────────────────────────────
          S2_COUNT:             ${{ github.event.inputs.count }}
          SCAN_DRIVE:           ${{ github.event.inputs.scan_drive || 'true' }}

          # ── HuggingFace cache dir (explicit) ──────────────────────────────
          HF_HOME:              /home/runner/.cache/huggingface

          # ── Auto-restart context ───────────────────────────────────────────
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}

        run: python section2_runner.py

      # ── 6. Summary ─────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "### Section 2 SEO Builder — Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Vision model | Florence-2-base (Microsoft, MIT, local CPU) |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO strategy | Visual analysis → unique title + 30 keywords |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO count | ${{ github.event.inputs.count || 'ALL pending' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Drive | ${{ github.event.inputs.scan_drive || 'true' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drive folder | ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview repo | ${{ vars.PREVIEW_REPO || 'guruimageusha' }}/${{ vars.PREVIEW_FOLDER || 'preview_webp' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API key needed | None — fully local inference |" >> $GITHUB_STEP_SUMMARY
          echo "| Rate limit | None — unlimited |" >> $GITHUB_STEP_SUMMARY
          echo "| Speed | ~15-30s per image on 2-core CPU |" >> $GITHUB_STEP_SUMMARY
          echo "| Job timeout | 5 hours (auto-restarts if still pending) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
