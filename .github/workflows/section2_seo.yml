name: Section 2 - SEO JSON Builder

on:
  workflow_dispatch:
  schedule:
    - cron: "10 2 * * *"

permissions:
  contents: read

jobs:
  build-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openpyxl requests pillow

      - name: Run Section 2
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          REPO2_TOKEN: ${{ secrets.REPO_2_TOKEN }}
          REPO2_SLUG:  ${{ secrets.REPO_2 }}
          REPO2_MAX_PER_JSON: "200"
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python section2_runner.py

      - name: Commit ultradata.xlsx updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ultradata: update from section2/manual-drop"
          file_pattern: ultradata.xlsx

