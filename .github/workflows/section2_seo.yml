name: Section 2 - SEO JSON Builder

# ─────────────────────────────────────────────────────────────────────────────
# V9.0 — Kaggle GPU + BLIP-2 Vision Model (100% Free · Ultra Fast)
#
#   WHY Kaggle GPU?
#   ─────────────────────────────────────────────────────────────────────────
#   ✅ Free T4/P100 GPU — 30 GPU-hours/week per account (FREE)
#   ✅ BLIP-2 vision model — actually SEES the image → perfect SEO captions
#   ✅ GPU inference ~10-20x faster than CPU Gemma 3 1B
#   ✅ No HF_TOKEN needed — BLIP-2 is fully open (Apache 2.0)
#   ✅ GitHub Action just triggers Kaggle + polls for result (lightweight)
#   ✅ Kaggle output pushed back to your GitHub repo automatically
#
#   SPEED on Kaggle T4 GPU:
#   • BLIP-2 load   : ~60s (first run)
#   • Per item      : ~2-5s (vision caption + SEO generation)
#   • Per session   : ~3,000-5,000 items in 9h Kaggle window
#
#   SETUP (one-time secrets needed):
#   • KAGGLE_USERNAME  — your Kaggle username
#   • KAGGLE_KEY       — your Kaggle API key (from kaggle.com/settings)
#   • REPO2_TOKEN      — GitHub PAT for your private data repo
#   • REPO_2           — your private repo slug (owner/repo)
#   • GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REFRESH_TOKEN
#   • GH_TOKEN, GH_OWNER
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of pending items to process (empty = ALL)"
        required: false
        default: ""
      scan_drive:
        description: "Scan Drive png_library_images for unmatched PNGs (true/false)"
        required: false
        default: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions:  write

jobs:
  build-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # GitHub action just triggers Kaggle + monitors

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install kaggle requests openpyxl

      - name: Configure Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Trigger Kaggle GPU job & wait for completion
        env:
          KAGGLE_USERNAME:      ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:           ${{ secrets.KAGGLE_KEY }}

          REPO2_TOKEN:          ${{ secrets.REPO_2_TOKEN }}
          REPO2_SLUG:           ${{ secrets.REPO_2 }}
          REPO2_MAX_PER_JSON:   "200"

          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          GH_TOKEN:             ${{ secrets.GH_TOKEN }}
          GH_OWNER:             ${{ secrets.GH_OWNER }}

          PREVIEW_REPO:         ${{ vars.PREVIEW_REPO    || 'guruimageusha' }}
          PREVIEW_BRANCH:       ${{ vars.PREVIEW_BRANCH  || 'main' }}
          PREVIEW_FOLDER:       ${{ vars.PREVIEW_FOLDER  || 'preview_webp' }}

          PNG_LIBRARY_FOLDER:   ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }}
          WATERMARK_TEXT:       ${{ vars.WATERMARK_TEXT  || 'www.ultrapng.com' }}

          S2_COUNT:             ${{ github.event.inputs.count }}
          SCAN_DRIVE:           ${{ github.event.inputs.scan_drive || 'true' }}

          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}

        run: python section2_runner.py --mode=trigger_kaggle

      - name: Job summary
        if: always()
        run: |
          echo "### Section 2 SEO Builder V9.0 — Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Vision model | BLIP-2 (Salesforce, Apache 2.0, GPU) |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO strategy | Real image captioning → 100% organic Google SEO |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime | Kaggle Free GPU (T4/P100) |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO count | ${{ github.event.inputs.count || 'ALL pending' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Drive | ${{ github.event.inputs.scan_drive || 'true' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drive folder | ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview repo | ${{ vars.PREVIEW_REPO || 'guruimageusha' }}/${{ vars.PREVIEW_FOLDER || 'preview_webp' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API key needed | None – fully open-source models |" >> $GITHUB_STEP_SUMMARY
          echo "| Speed | ~2-5s per item on T4 GPU |" >> $GITHUB_STEP_SUMMARY
          echo "| Kaggle session limit | 9h / 30 GPU-hrs per week (free) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
