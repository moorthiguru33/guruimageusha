name: Section 2 - SEO JSON Builder

# ─────────────────────────────────────────────────────────────────────────────
# V5.0 — Gemini 2.0 Flash Vision (FREE API, ~5s per image)
#
#   OLD (Moondream2 on CPU):  8 minutes per image
#   NEW (Gemini Flash API):   5–10 seconds per image  ← 50–100x faster
#
#   ✅ 100% free  — Gemini free tier: 1500 req/day, 15 req/min
#   ✅ Unlimited  — auto-restarts handle daily cap automatically
#   ✅ Vision     — Gemini sees each PNG, writes accurate descriptive SEO
#   ✅ No model   — zero download, zero GPU, zero CPU model loading
#   ✅ Light deps — only pillow + openpyxl + requests (installs in <30s)
#
#   SETUP (one-time, 2 minutes):
#     1. Go to  https://aistudio.google.com/app/apikey  (free, no card needed)
#     2. Click "Create API key"
#     3. Add it as GitHub Actions secret named:  GEMINI_API_KEY
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of pending items to process (empty = ALL)"
        required: false
        default: ""
      scan_drive:
        description: "Scan Drive png_library_images for unmatched PNGs (true/false)"
        required: false
        default: "true"

  # ── Auto-restart: uncomment to poll every 10 min until all items done ─────
  # schedule:
  #   - cron: "*/10 * * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions:  write

jobs:
  build-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 300   # 5-hour hard limit — script exits at 4h50m

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Dependencies ─────────────────────────────────────────────────
      #    No torch. No transformers. No HuggingFace. No 1.9 GB download.
      #    Installs in under 30 seconds.
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install openpyxl requests pillow

      # ── 4. Run Section 2 ──────────────────────────────────────────────────
      - name: Run Section 2
        env:
          # ── Private UltraPNG repo ─────────────────────────────────────────
          REPO2_TOKEN:          ${{ secrets.REPO_2_TOKEN }}
          REPO2_SLUG:           ${{ secrets.REPO_2 }}
          REPO2_MAX_PER_JSON:   "200"

          # ── Gemini Flash vision API (FREE — get key at aistudio.google.com)
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}

          # ── Google Drive credentials (for png_library_images scan) ────────
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          # ── GitHub credentials (WEBP upload + auto-restart dispatch) ───────
          GH_TOKEN:             ${{ secrets.GH_TOKEN }}
          GH_OWNER:             ${{ secrets.GH_OWNER }}

          # ── Preview repo settings ──────────────────────────────────────────
          PREVIEW_REPO:         ${{ vars.PREVIEW_REPO    || 'guruimageusha' }}
          PREVIEW_BRANCH:       ${{ vars.PREVIEW_BRANCH  || 'main' }}
          PREVIEW_FOLDER:       ${{ vars.PREVIEW_FOLDER  || 'preview_webp' }}

          # ── Drive PNG library ──────────────────────────────────────────────
          PNG_LIBRARY_FOLDER:   ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }}
          WATERMARK_TEXT:       ${{ vars.WATERMARK_TEXT  || 'www.ultrapng.com' }}

          # ── Run controls ───────────────────────────────────────────────────
          S2_COUNT:             ${{ github.event.inputs.count }}
          SCAN_DRIVE:           ${{ github.event.inputs.scan_drive || 'true' }}

          # ── Auto-restart context ───────────────────────────────────────────
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_REF_NAME:      ${{ github.ref_name }}

        run: python section2_runner.py

      # ── 5. Summary ─────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "### Section 2 SEO Builder — Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Vision model | Gemini 2.0 Flash (free API, ~5s/image) |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO strategy | Visual analysis → unique title + 30 keywords |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO count | ${{ github.event.inputs.count || 'ALL pending' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Drive | ${{ github.event.inputs.scan_drive || 'true' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drive folder | ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview repo | ${{ vars.PREVIEW_REPO || 'guruimageusha' }}/${{ vars.PREVIEW_FOLDER || 'preview_webp' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gemini free tier | 1500 req/day · 15 req/min · no credit card |" >> $GITHUB_STEP_SUMMARY
          echo "| Job timeout | 5 hours (auto-restarts if still pending) |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
