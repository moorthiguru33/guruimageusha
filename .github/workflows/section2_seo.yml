name: Section 2 - SEO JSON Builder

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of pending items to process (leave empty = ALL pending)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-seo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl requests pillow

      - name: Run Section 2
        env:
          SCOPE:                ${{ secrets.SCOPE }}
          REPO2_TOKEN:          ${{ secrets.REPO_2_TOKEN }}
          REPO2_SLUG:           ${{ secrets.REPO_2 }}
          REPO2_MAX_PER_JSON:   "200"
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          S2_COUNT:             ${{ github.event.inputs.count }}
        run: python section2_runner.py
