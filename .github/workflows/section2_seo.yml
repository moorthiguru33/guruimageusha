name: Section 2 - SEO JSON Builder

on:
  workflow_dispatch:
  schedule:
    - cron: "10 2 * * *"

permissions:
  contents: read

jobs:
  build-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install openpyxl requests

      - name: Run Section 2
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          REPO2_TOKEN: ${{ secrets.REPO_2_TOKEN }}
          REPO2_SLUG:  ${{ secrets.REPO_2 }}
          REPO2_MAX_PER_JSON: "200"
        run: python section2_runner.py

