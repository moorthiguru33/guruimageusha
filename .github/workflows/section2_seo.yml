name: Section 2 - SEO JSON Builder

# ─────────────────────────────────────────────────────────────────────────────
# V3.0 — Local model (Qwen2.5-0.5B-Instruct via HuggingFace Transformers)
#   • NO external API key needed (SCOPE removed)
#   • Runs 100% on ubuntu-latest CPU — free forever
#   • Model cached after first run via actions/cache → fast subsequent runs
#   • Template fallback guarantees every item always gets SEO content
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of pending items to process for SEO (empty = ALL)"
        required: false
        default: ""
      scan_drive:
        description: "Scan Drive png_library_images for unmatched PNGs (true/false)"
        required: false
        default: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-seo:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # ── 2. Python ─────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            openpyxl \
            requests \
            pillow \
            "transformers>=4.40.0" \
            accelerate
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      # ── 4. Restore HuggingFace model cache ────────────────────────────────
      #    First run  → cache MISS  → model downloaded once (~1 GB) → cached
      #    Later runs → cache HIT   → loaded from disk instantly (no download)
      - name: Restore HuggingFace model cache
        id: hf-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-qwen2.5-0.5b-instruct-v1

      - name: Show cache status
        run: |
          if [ "${{ steps.hf-cache.outputs.cache-hit }}" = "true" ]; then
            echo "✅  HuggingFace model cache HIT — no download needed"
          else
            echo "⬇️   HuggingFace model cache MISS — downloading model (~1 GB)..."
          fi

      # ── 5. Run Section 2 ──────────────────────────────────────────────────
      - name: Run Section 2
        env:
          # ── Private UltraPNG repo (ultradata.xlsx + SEO JSONs) ────────────
          REPO2_TOKEN:          ${{ secrets.REPO_2_TOKEN }}
          REPO2_SLUG:           ${{ secrets.REPO_2 }}
          REPO2_MAX_PER_JSON:   "200"

          # ── Google Drive credentials (for png_library_images scan) ─────────
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

          # ── GitHub credentials (for WEBP upload to preview repo) ───────────
          GH_TOKEN:             ${{ secrets.GH_TOKEN }}
          GH_OWNER:             ${{ secrets.GH_OWNER }}

          # ── Preview repo settings ──────────────────────────────────────────
          PREVIEW_REPO:         ${{ vars.PREVIEW_REPO    || 'guruimageusha' }}
          PREVIEW_BRANCH:       ${{ vars.PREVIEW_BRANCH  || 'main' }}
          PREVIEW_FOLDER:       ${{ vars.PREVIEW_FOLDER  || 'preview_webp' }}

          # ── Drive PNG library settings ─────────────────────────────────────
          PNG_LIBRARY_FOLDER:   ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }}
          WATERMARK_TEXT:       ${{ vars.WATERMARK_TEXT  || 'www.ultrapng.com' }}

          # ── Run controls ───────────────────────────────────────────────────
          S2_COUNT:             ${{ github.event.inputs.count }}
          SCAN_DRIVE:           ${{ github.event.inputs.scan_drive || 'true' }}

          # ── HuggingFace settings ───────────────────────────────────────────
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
          TOKENIZERS_PARALLELISM:       "false"

        run: python section2_runner.py

      # ── 6. Save HuggingFace model cache (always, even on failure) ─────────
      - name: Save HuggingFace model cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/huggingface
          key: hf-qwen2.5-0.5b-instruct-v1

      # ── 7. Summary ─────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "### Section 2 SEO Builder — Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Model | Qwen/Qwen2.5-0.5B-Instruct (local CPU, no API key) |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO count | ${{ github.event.inputs.count || 'ALL pending' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Drive PNG library | ${{ github.event.inputs.scan_drive || 'true' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Drive folder | ${{ vars.PNG_LIBRARY_FOLDER || 'png_library_images' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Preview repo | ${{ vars.PREVIEW_REPO || 'guruimageusha' }}/${{ vars.PREVIEW_FOLDER || 'preview_webp' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model cache | ${{ steps.hf-cache.outputs.cache-hit == 'true' && 'HIT ✅' || 'MISS — downloaded this run' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
