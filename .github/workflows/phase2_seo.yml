name: Phase 2 — SEO Engine (GitHub Actions)

on:
  repository_dispatch:
    types: [phase1_complete]
  schedule:
    - cron: "0 6 * * *"  # Daily at 6 AM UTC (catches manual drops)
  workflow_dispatch:
    inputs:
      reason:
        description: "Manual trigger reason (optional)"
        required: false
        default: "manual check"

permissions:
  contents: read

jobs:
  run-seo:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: pip install requests Pillow --quiet

      - name: Run SEO Engine
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_SHEETS_ID:     ${{ secrets.GOOGLE_SHEETS_ID }}
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          GITHUB_TOKEN_REPO2:   ${{ secrets.REPO_2_TOKEN }}
          GITHUB_REPO2:         ${{ secrets.REPO_2 }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
        run: python3 phase2/seo_engine.py
